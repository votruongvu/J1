# nginx config for the J1 Execution Console container.
#
# Serves the Vite-built SPA from /usr/share/nginx/html and proxies
# /api/* to the FastAPI service so the browser stays single-origin.
# This means the backend doesn't need a CORS allow-list for the dev
# stack — the only origin the browser ever sees is the nginx host.
#
# The upstream hostname `api` is resolved by the Docker bridge
# network defined in deploy/dev/docker-compose.yml.

server {
    listen       80;
    server_name  _;

    # Serve compressed assets when the client accepts them. Vite
    # produces hashed filenames so we can cache aggressively.
    gzip            on;
    gzip_types      application/javascript application/json text/css text/plain image/svg+xml;
    gzip_min_length 1024;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- API + SSE proxy ------------------------------------------
    # The frontend defaults `apiBase` to `/api` (set via the
    # `VITE_API_BASE_URL` build arg). Strip the `/api` prefix before
    # forwarding so the backend's existing routes (`/ingestion-runs`,
    # `/health`, etc.) match.
    #
    # SSE (`/ingestion-runs/{id}/events/stream`) needs three
    # specific tweaks: HTTP/1.1 upstream, proxy buffering off so
    # frames stream through, and a long read timeout because the
    # stream can stay idle between events. Documented per-directive
    # below for future maintainers.
    location /api/ {
        # 1) Strip the `/api` prefix on the way to the upstream.
        rewrite  ^/api/(.*)$ /$1 break;
        proxy_pass http://api:8000;

        # 2) Forwarded request metadata. The backend's `_security_*`
        #    middleware doesn't currently inspect these, but they're
        #    standard hygiene for any reverse proxy.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 3) HTTP/1.1 + no-buffering + long read timeout for SSE.
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
    }

    # ---- Static SPA fallback --------------------------------------
    # Hashed asset files are cached for a year (Vite's `dist/assets/*`
    # filenames change on every content change, so this is safe).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Every other path falls back to index.html so client-side routing
    # works on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
