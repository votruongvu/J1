[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "j1"
version = "0.0.1"
description = "Reusable knowledge intelligence framework"
requires-python = ">=3.11"
dependencies = [
    "temporalio>=1.7",
    "pyyaml>=6.0",
    "fastapi>=0.100",
    "pydantic>=2.0",
    "python-multipart>=0.0.7",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "httpx>=0.24"]

[tool.hatch.build.targets.wheel]
packages = ["src/j1"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
