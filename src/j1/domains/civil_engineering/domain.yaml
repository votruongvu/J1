# ---- Capabilities the pack would use but framework doesn't ship ----
#
# Surfaced on planning_result.json so reviewers see the backlog.

unsupported_capabilities:
  - capability: action_item_extraction
    reason: "No dedicated action-item extractor wired today; method statement / NCR / inspection report would benefit."
  - capability: responsibility_extraction
    reason: "No dedicated responsibility extractor; relies on entity extraction in the graph step."
  - capability: process_step_extraction
    reason: "Method statement step sequencing relies on chunking + downstream LLM analysis; no dedicated extractor today."
  - capability: drawing_title_block_extraction
    reason: "Title-block fields (drawing_number, revision, scale, discipline) require a vision-driven structured extractor; not yet implemented."
  - capability: boq_table_normalisation
    reason: "BOQ tables are extracted as generic tables; no BOQ-specific row-level normaliser yet."
  - capability: code_or_standard_reference_extraction
    reason: "No dedicated extractor for standards (ACI/EN/BS/AASHTO); generic entity extraction may capture these."

# ---- LLM planner prompt addon ----

prompt_addon: |
  You are planning ingestion for a Civil Engineering / Construction document.

  Use Civil Engineering domain understanding when deciding the processing plan.

  Pay special attention to:
  - drawings
  - BOQ / quantity tables
  - inspection findings
  - site photos
  - defects
  - structural elements
  - construction activities
  - materials
  - test results
  - method statements
  - responsibilities
  - approvals
  - RFIs
  - variation/change orders
  - non-conformance reports
  - acceptance criteria
  - standards/specifications
  - project location and work packages

  Do not assume every Civil Engineering document needs full premium processing.
  Use selective enrichment.

  Prefer:
  - table enrichment for BOQ, quantity, test result, schedule, checklist, or cost tables
  - vision enrichment for drawings, diagrams, scanned sheets, and inspection photos
  - risk/action extraction for method statements, NCRs, inspection reports, tender documents, and variation orders
  - graph extraction when there are meaningful relationships between projects, locations, drawings, components, defects, responsibilities, activities, and approvals
  - generic fast indexing when the document is clean text and has no strong domain-specific analysis need

  If the document does not clearly belong to Civil Engineering, recommend fallback to generic planning.

# ---- Domain enrichment policy ----
#
# How this pack wants the post-compile assessor to handle enrichment.
# Consumed by `assess_post_compile_enrich`:
#  * `policy: always` → upgrade verdict to RECOMMENDED at minimum;
#  apply force_recommended_tasks even when
#  compile signals are weak.
#  * `policy: auto` → assessor decides, force/optional/denied
#  lists still applied.
#  * `policy: never` → collapse to SKIP unless compile already
#  blocked (failed / empty document).
#
# Civil docs almost always benefit from requirement + risk extraction
# (method statements, NCRs, RFIs, tender docs), so we force those
# tasks. Vision enrichment stays driven by compile signals — the
# rule-based assessor opts in when has_images / image_count > 0.
enrichment_policy:
  policy: always
  force_recommended_tasks:
    - requirement_extraction
    - risk_extraction
  optional_tasks:
    - quality_assessment
  denied_tasks: []
  require_enrichment_success: false
  default_model_tier: fast
  reasoning: >-
    Civil engineering documents (BOQ, method statements, NCRs, RFIs,
    inspection reports, tender documents) rely on domain-specific
    requirement and risk extraction to be useful downstream.
    Generic chunking alone loses the actionable signal.

# ---- Extraction hints ( enrichers will consume) ----
#
# Pure data — generic operators read the hints and project them
# into per-enricher prompts/queries. No domain-specific code path
# branches on these in core ingestion.

extraction_hints:
  metadata_fields:
    - project_number
    - project_name
    - contractor
    - subcontractor
    - engineer
    - client_owner
    - drawing_number
    - drawing_revision
    - discipline
    - location
    - work_package
    - document_date
    - approval_status
  entity_hints:
    - Contractor
    - Subcontractor
    - Engineer
    - Project
    - WorkPackage
    - Drawing
    - StructuralElement
    - Material
    - InspectionFinding
    - NonConformance
    - Defect
    - RiskItem
    - Specification
    - Standard
  table_hints:
    - "BOQ tables: item / description / unit / quantity / rate columns"
    - "Test result tables: sample / test / value / pass-fail columns"
    - "Schedule tables: activity / start / end / dependency columns"
    - "Inspection checklists: item / status / comment columns"
  image_hints:
    - "Drawings: inspect title block for drawing_number / revision / discipline"
    - "Site photos may show defects, work-in-progress, or completed work"
    - "Diagrams typically show structural elements + dimensions"
  terminology_hints:
    - "RFI = Request for Information"
    - "NCR = Non-Conformance Report"
    - "BOQ = Bill of Quantities"
    - "EOT = Extension of Time"
    - "VO = Variation Order"
    - "ITP = Inspection and Test Plan"
  retrieval_hints:
    - "Normalize abbreviations on retrieval (RFI / NCR / BOQ / VO)"
    - "Drawing numbers often follow project-prefixed schemes (e.g. ABC-S-001)"
    - "Specifications cite standards (ACI / EN / BS / AASHTO)"
  # Static entity-alias bundle. Query-side retrieval reads this via
  # ``DomainPackAugmentationProvider`` and the ``AliasResolver``; the
  # forms feed retrieval expansion only — the original user query is
  # always preserved for answer synthesis. Keep canonical names
  # operator-readable; aliases include abbreviations + fully-
  # qualified expansions.
  entity_aliases:
    - canonical_name: "Request for Information"
      aliases: ["RFI"]
      entity_type: "document_type"
    - canonical_name: "Non-Conformance Report"
      aliases: ["NCR"]
      entity_type: "document_type"
    - canonical_name: "Bill of Quantities"
      aliases: ["BOQ"]
      entity_type: "document_type"
    - canonical_name: "Variation Order"
      aliases: ["VO"]
      entity_type: "document_type"
    - canonical_name: "Extension of Time"
      aliases: ["EOT"]
      entity_type: "concept"
    - canonical_name: "Inspection and Test Plan"
      aliases: ["ITP"]
      entity_type: "document_type"

# ---- Validation rules (analyzer + validation enricher) ----
#
# What the domain considers required / suspicious. Pure data; the
# analyzer + validation enricher decide how to enforce.

validation_rules:
  required_metadata_fields:
    - project_number
    - document_date
  expected_document_structure:
    - Method statements should include 'Scope', 'Procedure', and 'Safety' sections.
    - Inspection reports should include findings + responsible-party fields.
    - BOQ should have summary totals at the bottom of each section.
  low_quality_warning_conditions:
    - page_count > 30 with total_text_chars < 5000 (likely heavily scanned)
    - text_extractable_ratio < 0.4 (poor OCR / scan quality)
    - has_tables but table_count == 0 in extraction
  enrichment_triggers:
    - document_type == method_statement implies risk_extraction
    - document_type == inspection_report implies requirement_extraction
    - has_drawings implies image_captioning

# ---- Per-enricher prompt overrides ----
#
# Replace the enricher's built-in default. The pack-level
# `prompt_addon` is still applied across every enricher; this
# block ADDS per-enricher customisation. Leave any field unset
# (or null) to keep the default.

prompt_pack:
  table_enrichment_prompt: |-
    Extract structured table data from this content.
    Focus on civil-engineering tables: BOQs (item/description/
    unit/quantity/rate), test results (sample/test/value/pass-fail),
    schedules (activity/start/end), and inspection checklists
    (item/status/comment).
    Preserve numeric units exactly as written.
  image_enrichment_prompt: |-
    Describe the visual content for civil-engineering operators.
    For drawings: capture drawing_number, revision, scale, and
    discipline if visible in the title block. For site photos:
    note defects, work activities, and structural elements. For
    diagrams: list structural elements and their relationships.
  classification_prompt: |-
    Classify this civil-engineering document among the pack's
    document types (BOQ / method_statement / NCR / RFI / inspection_report
    / variation_order / tender_document / drawing / specification / ...).
    If the document doesn't match any specific civil type, classify
    as 'other'.
  validation_prompt: |-
    Validate this civil-engineering document against the domain
    rules. Required metadata: project_number, document_date.
    Expected structure varies by document type (see the pack's
    expected_document_structure list).


# ---- Document profile rules ----------------------------------------
#
# Pattern-based rules that the assessment-layer
# ``RecommendationResolver`` evaluates BEFORE running the lightweight
# profiler. Lower ``priority`` wins. The ``hints`` block is advisory
# only — the FE surfaces them as "likely / suspected" copy and the
# compile layer must not branch on them.
#
# Authoring contract:
#   * id              required (stable string id, used in audit trail)
#   * priority        smaller wins; ties broken by id
#   * filename_regex  Python regex, case-insensitive, OR
#   * title_regex     same shape (at least one is required)
#   * recommended_profile  minimum_queryable / standard / advanced
#   * confidence      0..1; surfaced in the response audit
#   * reason          operator-readable; rendered next to the chosen
#                     profile in the dialog
#   * hints           likely_tables / likely_images / likely_requirements
#                     / likely_scanned / likely_long_document

document_profile_rules:
  - id: civil_rfp_tender
    priority: 10
    filename_regex: '(?i)(\b|_)(rfp|tender|itb|rfq|invitation[\s_-]?to[\s_-]?bid)(\b|_)'
    title_regex: '(?i)\b(request for proposal|tender document|invitation to bid)\b'
    recommended_profile: advanced
    confidence: 0.85
    reason: >-
      Filename or title suggests an RFP / tender package. These
      packages usually carry requirements tables, schedules of
      quantities, and figures that benefit from full enrichment.
    hints:
      likely_tables: true
      likely_requirements: true
      likely_long_document: true

  - id: civil_boq
    priority: 15
    filename_regex: '(?i)(\b|_)(boq|bill[\s_-]?of[\s_-]?quantit)'
    title_regex: '(?i)\bbill of quantit'
    recommended_profile: advanced
    confidence: 0.8
    reason: >-
      Filename or title suggests a BOQ. BOQs are table-dense and
      the table-enrichment pass is recommended.
    hints:
      likely_tables: true
      likely_requirements: true

  - id: civil_drawing
    priority: 20
    filename_regex: '(?i)(\b|_)(drawing|dwg|sheet|plan)(\b|_)'
    title_regex: '(?i)\b(general arrangement|plan view|section|elevation)\b'
    recommended_profile: advanced
    confidence: 0.7
    reason: >-
      Filename or title suggests a drawing sheet. Drawings are
      typically image-dense and require multimodal processing.
    hints:
      likely_images: true
      likely_scanned: true

  - id: civil_specification
    priority: 25
    filename_regex: '(?i)(\b|_)(spec|specification)s?(\b|_)'
    title_regex: '(?i)\b(technical specification|particular specification)\b'
    recommended_profile: standard
    confidence: 0.75
    reason: >-
      Filename or title suggests a specification document.
      Specifications are usually text-dense; standard mode is the
      balanced choice.
    hints:
      likely_requirements: true
      likely_long_document: true


# ----------------------------------------------------------------------
# Assessment Capability Hints (NEW — 2026-05-16)
#
# Per-document-type checkbox-default recommendations consumed by the
# deterministic capability assessor. Each entry is a hint, never a
# decision — the user can always uncheck. The assessor folds these
# alongside its filename / equation-symbol / domain-keyword signals;
# `confidence: high` pre-checks the box, medium / low surface the
# reason without flipping the default.
# ----------------------------------------------------------------------
assessment_capability_hints:
  boq:
    process_tables:
      recommended: true
      confidence: high
      reason: "BOQ documents are usually table-dense and table processing is recommended."
    process_images:
      recommended: false
      confidence: low
      reason: "BOQ documents are usually text/table based unless drawing or scanned signals are present."
    process_equations:
      recommended: false
      confidence: low
      reason: ""

  construction_drawing:
    process_images:
      recommended: true
      confidence: high
      reason: "Drawing documents are usually visual and image processing is recommended."
    process_tables:
      recommended: true
      confidence: medium
      reason: "Drawing sheets may contain schedules or title-block tables."
    process_equations:
      recommended: false
      confidence: low
      reason: ""

  structural_drawing:
    process_images:
      recommended: true
      confidence: high
      reason: "Structural drawings carry the bulk of their information visually."
    process_tables:
      recommended: true
      confidence: medium
      reason: "Structural drawings often include rebar / section / member schedules."
    process_equations:
      recommended: false
      confidence: low
      reason: ""

  structural_calculation:
    process_equations:
      recommended: true
      confidence: high
      reason: "Structural calculation documents usually contain formulas, load combinations, and numeric checks."
    process_tables:
      recommended: true
      confidence: medium
      reason: "Structural calculations often include tabular calculation summaries."
    process_images:
      recommended: false
      confidence: low
      reason: ""

  inspection_report:
    process_images:
      recommended: true
      confidence: medium
      reason: "Inspection reports may include site photos or scanned evidence."
    process_tables:
      recommended: true
      confidence: medium
      reason: "Inspection reports often include checklist or findings tables."
    process_equations:
      recommended: false
      confidence: low
      reason: ""

  test_report:
    process_tables:
      recommended: true
      confidence: high
      reason: "Test reports usually contain tabular result values, limits, and pass/fail status."
    process_images:
      recommended: false
      confidence: low
      reason: ""
    process_equations:
      recommended: false
      confidence: low
      reason: ""

  specification:
    process_tables:
      recommended: true
      confidence: medium
      reason: "Specifications may contain requirement matrices, schedules, or acceptance criteria tables."
    process_images:
      recommended: false
      confidence: low
      reason: ""
    process_equations:
      recommended: false
      confidence: low
      reason: ""


# ----------------------------------------------------------------------
# Compile Prompt Context (NEW — 2026-05-16)
#
# Small indexing-time system-prompt addon prepended to LightRAG's
# entity / relationship extraction LLM callable. NEVER replaces
# RAGAnything's / LightRAG's own prompt — purely prepends so the
# structured extraction template still runs unchanged.
#
# Hard contract:
#   * No new LLM call.
#   * No assessment.
#   * No enrichment behavior change.
#
# `enabled: false` (or omitting the block) makes this a no-op.
# ----------------------------------------------------------------------
compile_prompt_context:
  enabled: true
  max_tokens_budget_hint: 250
  apply_to:
    - entity_extraction
  system_addon: |-
    You are indexing a Civil Engineering / Construction document.

    When extracting knowledge graph entities and relationships, prioritize:
    - projects, sites, locations, zones, and levels
    - drawings, drawing numbers, revisions, disciplines, and title-block metadata
    - specifications, standards, acceptance criteria, and code references
    - work packages, construction activities, materials, and structural elements
    - BOQ items, descriptions, units, quantities, rates, and amounts
    - inspection findings, defects, NCRs, RFIs, approvals, responsible parties, and action items
    - test reports, sample IDs, test methods, result values, limits, and pass/fail status

    Preserve relationships only when they are explicitly supported by the source document.

    Do not infer missing quantities, costs, compliance status, safety conclusions, engineering conclusions, or responsibility assignments that are not present in the source.

    Keep extracted names, numbers, units, drawing references, specification references, and document identifiers exactly as written when possible.


# ----------------------------------------------------------------------
# Compile Prompt Focus (NEW — 2026-05-16, optional)
#
# Short per-document-type focus snippets appended to the
# `compile_prompt_context.system_addon` when the detected document
# type matches. Keep snippets tight — the addon as a whole stays
# inside `max_tokens_budget_hint`.
# ----------------------------------------------------------------------
compile_prompt_focus:
  boq:
    - "Preserve BOQ item, description, unit, quantity, rate, and amount relationships."
    - "Do not infer missing quantities, rates, totals, or cost values."

  construction_drawing:
    - "Prioritize drawing title, drawing number, revision, discipline, scale, levels, zones, and referenced components."
    - "Do not infer dimensions or specifications that are not legible or explicitly present."

  structural_drawing:
    - "Prioritize structural elements, grids, levels, rebar/detail references, drawing numbers, and revisions."
    - "Preserve explicit references between drawing sheets, details, sections, and components."

  structural_calculation:
    - "Prioritize load combinations, design checks, code references, formulas, assumptions, units, and result values."
    - "Do not validate or reinterpret calculations unless the result is explicitly stated."

  inspection_report:
    - "Prioritize inspection date, location, finding, defect, affected component, severity, responsible party, and recommended action."
    - "Preserve links between findings, photos, locations, and action items when explicitly present."

  test_report:
    - "Prioritize sample ID, test method, standard, result value, acceptance limit, and pass/fail status."
    - "Keep numeric values and units exactly as written."

  rfi:
    - "Prioritize question, response, reference drawing, responsible party, response date, and decision status."
    - "Preserve explicit references to drawings, specifications, and affected work packages."

  non_conformance_report:
    - "Prioritize NCR number, defect, location, root cause, corrective action, preventive action, responsible party, and closure status."
    - "Preserve explicit links between defect, location, responsible party, and corrective action."

  tender_document:
    - "Prioritize scope of work, submission requirements, responsibilities, acceptance criteria, specifications, schedules, and BOQ references."
    - "Do not infer commercial or contractual obligations beyond the source text."
