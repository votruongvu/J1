    step_overrides:
      table_enrichment:
        enabled: true
        scope: selected_pages
        reason: "Submittals carry product/spec tables."
      vision_enrichment:
        enabled: true
        scope: selected_pages
        reason: "Product photos and shop drawings may need vision."

  shop_drawing_submittal:
    recommended_profile: premium
    chunking_strategy: page_aware
    candidate_entity_types: [Drawing, Material, StructuralElement, Approval]
    step_overrides:
      vision_enrichment:
        enabled: true
        scope: all_image_pages
        reason: "Shop drawings are primary content."

  test_report:
    recommended_profile: premium
    chunking_strategy: section_aware
    candidate_entity_types: [Material, TestResult, Standard]
    extraction_targets:
      - sample_id
      - test_method
      - test_standard
      - result_value
      - acceptance_limit
      - pass_fail_status
    step_overrides:
      table_enrichment:
        enabled: true
        scope: tables_only
        reason: "Test results are tabular."
      quality_assessment:
        enabled: true
