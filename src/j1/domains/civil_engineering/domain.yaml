        reason: "Cost/time impact carries risk."

  change_order:
    recommended_profile: premium
    chunking_strategy: section_aware
    candidate_entity_types: [ChangeOrder, Risk, ResponsibleParty]
    step_overrides:
      risk_extraction:
        enabled: true
        scope: document
        reason: "Change orders alter scope and carry risk."

  non_conformance_report:
    recommended_profile: premium
    chunking_strategy: section_aware
    candidate_entity_types:
