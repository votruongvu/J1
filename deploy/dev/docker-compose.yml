# Local-development Docker Compose stack for J1.
#
# Brings up:
#   - api          : FastAPI server (`python -m deploy.dev.api`)
#   - worker       : Temporal worker (`python -m deploy.dev.worker`)
#   - frontend     : Static SPA (J1 Execution Console) served by nginx
#                    with `/api/*` proxied to the api service
#   - temporal     : Temporal server with in-memory persistence
#   - temporal-ui  : Browser UI for Temporal
#
# Intentionally NOT included (and why — see deploy/dev/README.md § 3):
#   - PostgreSQL   : the framework uses flat-file JSON registries +
#                    per-project SQLite FTS5; no relational store
#   - Redis        : not used anywhere in the framework
#   - MinIO / S3   : workspace is filesystem-based, mounted as a
#                    Docker volume

name: j1-dev

services:
  api:
    build:
      context: ../..
      dockerfile: deploy/dev/Dockerfile
    image: j1-dev:latest
    container_name: j1-api
    env_file: ../../.env
    ports:
      - "${J1_API_PORT:-8000}:8000"
    volumes:
      - j1_workspace:/var/lib/j1
      # Bind-mount Python source so code edits land without rebuilding
      # the image. `pip install -e .` (run during the image build)
      # already symlinked the j1 package; the bind mount transparently
      # replaces the baked-in source files with the host copy. Restart
      # the container after edits — there's no auto-reload (Temporal
      # workflow code is replay-sensitive, so a watcher could load
      # half-edited modules into a running worker). Dependency
      # changes in pyproject.toml STILL need a rebuild.
      #
      # Container path is /app/src and /app/deploy because the
      # Dockerfile sets WORKDIR /app and copies into those subdirs.
      - ../../src:/app/src
      - ../../deploy:/app/deploy
    depends_on:
      temporal:
        condition: service_healthy
      temporal-init:
        condition: service_completed_successfully
    networks:
      - j1-net
    restart: unless-stopped
    command: ["python", "-m", "deploy.dev.api"]

  worker:
    image: j1-dev:latest
    container_name: j1-worker
    build:
      context: ../..
      dockerfile: deploy/dev/Dockerfile
    env_file: ../../.env
    volumes:
      - j1_workspace:/var/lib/j1
      # MinerU's HuggingFace cache. Mounted at `$HF_HOME` (set in
      # the Dockerfile). Empty by default — the dev stack offloads
      # VLM inference to LM Studio / vLLM via
      # `J1_RAGANYTHING_BACKEND=vlm-http-client`, so MinerU never
      # touches local model weights. The mount is preserved so an
      # operator can flip back to a local backend without losing
      # downloaded weights between rebuilds.
      - j1_huggingface_cache:/opt/huggingface
      # Same bind mounts as api — see comment above.
      - ../../src:/app/src
      - ../../deploy:/app/deploy
    depends_on:
      temporal:
        condition: service_healthy
      temporal-init:
        condition: service_completed_successfully
    networks:
      - j1-net
    restart: unless-stopped
    command: ["python", "-m", "deploy.dev.worker"]

  # Frontend SPA — Vite-built static bundle served by nginx with
  # `/api/*` proxied to the `api` service over the Docker bridge.
  # Browser stays single-origin so CORS is a non-issue.
  #
  # Code edits: the bundle is baked into the image at build time, so
  # changes under `frontend/src/` need a rebuild:
  #
  #   docker compose -f deploy/dev/docker-compose.yml up --build frontend
  #
  # Or bypass the container entirely for HMR / fast iteration: run
  # `npm run dev` on the host (`cd frontend && npm run dev`) and
  # point your browser at http://localhost:5173 — the host-side dev
  # server still talks to the api container on its published port.
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        # Build-time API base URL baked into the SPA. `/api` keeps
        # the browser single-origin via nginx's proxy block. To point
        # the bundle at a different backend (staging, etc.), override:
        #   docker compose build --build-arg VITE_API_BASE_URL=https://api.example.com frontend
        VITE_API_BASE_URL: ${J1_FRONTEND_API_BASE_URL:-/api}
    image: j1-frontend:latest
    container_name: j1-frontend
    ports:
      - "${J1_FRONTEND_PORT:-8081}:80"
    depends_on:
      - api
    networks:
      - j1-net
    restart: unless-stopped

  # Temporal's own storage. Postgres is here ONLY for Temporal — the
  # J1 framework itself does NOT use a relational database (it uses
  # flat-file JSON registries + per-project SQLite FTS5 under
  # `J1_DATA_ROOT`). Temporal's auto-setup image only supports
  # mysql8 / postgres12 / postgres12_pgx / cassandra; postgres is
  # the lightest and most familiar of those.
  postgresql:
    image: postgres:15-alpine
    container_name: j1-postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - j1_postgres:/var/lib/postgresql/data
    networks:
      - j1-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    # The official auto-setup image: bundles the server + the
    # admin-tools CLI + schema initialisation. On first boot it
    # creates the Temporal schema in Postgres automatically.
    image: temporalio/auto-setup:1.24.2
    container_name: j1-temporal
    environment:
      - DB=postgres12_pgx
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
      - DEFAULT_NAMESPACE=default
      - SKIP_DEFAULT_NAMESPACE_CREATION=false
    ports:
      - "7233:7233"      # gRPC (frontend)
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - j1-net
    healthcheck:
      # `temporalio/auto-setup` ships `tctl` (the admin CLI), NOT the
      # newer `temporal` binary — so the healthcheck has to use tctl.
      # `tctl workflow list` succeeds only when the cluster is fully
      # up (frontend + history + matching all reachable + the default
      # namespace exists). Matches the recipe in Temporal's own
      # docker-compose example repo.
      test:
        - "CMD"
        - "tctl"
        - "--address"
        - "temporal:7233"
        - "workflow"
        - "list"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  # One-shot init: registers J1's custom search attributes with the
  # default namespace so the workflow's `J1IngestStage` /
  # `J1IngestMode` upserts succeed at activation time. Without this,
  # flipping `J1_TEMPORAL_SEARCH_ATTRIBUTES_ENABLED=true` causes
  # every workflow activation to fail with `BadSearchAttributes` —
  # see deploy/dev/README.md § "Temporal search attributes".
  #
  # Idempotent: re-running on an already-registered cluster is a
  # warning, not a failure, so this stays correct across `up` /
  # `down` / `up` cycles. Exits as soon as both attributes are
  # registered (or already-present).
  #
  # Reuses the same `temporalio/auto-setup` image the server runs, so
  # no extra image pull. `tctl admin cluster add-search-attributes`
  # is the right command for Temporal 1.24 (the newer
  # `temporal operator search-attribute create` ships in `temporal`,
  # which `auto-setup` doesn't include).
  temporal-init:
    image: temporalio/auto-setup:1.24.2
    container_name: j1-temporal-init
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - j1-net
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    # `--auto_confirm` skips the interactive prompt tctl shows on
    # mutating cluster commands. The `|| true` swallows the
    # "attribute already exists" error so the service is idempotent
    # across `down` / `up` cycles. Each attribute is registered
    # as a Keyword (exact-match string filter).
    #
    # Adding a new attribute below requires a matching upsert call
    # in the workflow (`_set_search_attribute` in
    # `project_processing.py`); registration alone has no operator-
    # visible effect until the workflow writes values. Conversely,
    # writing without registering crashes workflow activation when
    # `J1_TEMPORAL_SEARCH_ATTRIBUTES_ENABLED=true`.
    command:
      - |
        set -e
        echo "[temporal-init] registering J1 search attributes…"
        register_keyword() {
          tctl --auto_confirm --address temporal:7233 \
            admin cluster add-search-attributes \
            --name "$$1" --type Keyword \
          || echo "[temporal-init] $$1 already registered — skipping"
        }
        # Stage / mode — written on every workflow.
        register_keyword J1IngestStage
        register_keyword J1IngestMode
        # Document + workspace identity — written on every workflow.
        register_keyword J1DocumentId
        register_keyword J1WorkspaceId
        # Parser identity — written when a compiler kind is chosen.
        register_keyword J1ParserName
        # Adaptive-plan signals — written when the planner runs.
        register_keyword J1RequiresVision
        register_keyword J1RequiresPremiumLLM
        echo "[temporal-init] done."

  temporal-ui:
    image: temporalio/ui:2.31.0
    container_name: j1-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      # CORS origin must match the published port — both derive from
      # the same env var so an override flips both halves at once.
      - TEMPORAL_CORS_ORIGINS=http://localhost:${J1_TEMPORAL_UI_PORT:-8080}
    ports:
      - "${J1_TEMPORAL_UI_PORT:-8080}:8080"
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - j1-net

networks:
  j1-net:
    driver: bridge

volumes:
  j1_workspace:          # framework state (per-project JSON registries, SQLite FTS5)
  j1_postgres:           # Temporal's own storage — not used by J1 itself
  j1_huggingface_cache:  # MinerU model weights when running a local backend; empty in the default vlm-http-client setup
