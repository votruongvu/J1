# Local-development Docker Compose stack for J1.
#
# Phase 1 (snapshot-centered refactor) — the stack now matches the
# target provider seams:
#
#  * postgres     — J1 application metadata + Postgres FTS (evidence)
#                   AND Temporal's own storage (separate database).
#  * redis        — cache provider.
#  * minio        — S3-compatible artifact storage.
#  * qdrant       — vector store.
#  * neo4j        — graph store.
#  * raganything  — the only retrieval orchestrator we ship (lives in
#                   the worker process; persisted to a named volume).
#  * temporal     — workflow runtime (uses the shared postgres).
#  * temporal-ui  — browser UI for Temporal.
#  * api / worker — J1 backend + Temporal worker.
#  * frontend     — Vite static bundle served by nginx.
#
# Volume strategy
# ---------------
# Heavy runtime/index/temp paths live in NAMED volumes (fast Linux-VM
# disk on macOS Docker Desktop, not a bind mount through gRPC FUSE).
# Source code is bind-mounted ONLY for the api/worker so live edits
# pick up without rebuilding the image.
#
# Reset
# -----
# Phase 1 ships ``scripts/dev/reset_docker.sh`` — it stops the stack
# and ``docker volume rm`` every named volume below. Dev data is
# throwaway by policy.

name: j1-dev

services:
  # ─── Postgres ────────────────────────────────────────────────
  # Shared between Temporal and J1 application metadata. The init
  # script in ``postgres-init/`` creates two databases:
  #
  #   * ``temporal`` — Temporal's own storage (managed by auto-setup)
  #   * ``j1``       — J1 application + Postgres FTS for evidence
  #
  # Phase 2 will add the j1 schema migrations here.
  postgres:
    image: postgres:16-alpine
    container_name: j1-postgres
    environment:
      POSTGRES_USER: ${J1_POSTGRES_USER:-j1}
      POSTGRES_PASSWORD: ${J1_POSTGRES_PASSWORD:-j1}
      POSTGRES_DB: j1
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${J1_POSTGRES_PORT:-5432}:5432"
    networks:
      - j1-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${J1_POSTGRES_USER:-j1}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ───────────────────────────────────────────────────
  # Cache provider. No persistence configured (cache only); switch
  # to ``redis-server --appendonly yes`` and add the named volume
  # if you need durability.
  redis:
    image: redis:7-alpine
    container_name: j1-redis
    ports:
      - "${J1_REDIS_PORT:-6379}:6379"
    networks:
      - j1-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── MinIO ───────────────────────────────────────────────────
  # S3-compatible artifact storage. The init container below
  # creates the default bucket so the api/worker doesn't have to
  # bootstrap it.
  minio:
    image: minio/minio:latest
    container_name: j1-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${J1_ARTIFACT_ACCESS_KEY:-j1-dev}
      MINIO_ROOT_PASSWORD: ${J1_ARTIFACT_SECRET_KEY:-j1-dev-secret}
    volumes:
      - minio_data:/data
    ports:
      - "${J1_MINIO_PORT:-9000}:9000"
      - "${J1_MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - j1-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot bucket creation. Re-running on an already-bootstrapped
  # MinIO is idempotent (``mb --ignore-existing``).
  minio-init:
    image: minio/mc:latest
    container_name: j1-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - j1-net
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 \
          "${J1_ARTIFACT_ACCESS_KEY:-j1-dev}" \
          "${J1_ARTIFACT_SECRET_KEY:-j1-dev-secret}"
        mc mb --ignore-existing local/${J1_ARTIFACT_BUCKET:-j1-artifacts}
        echo "[minio-init] bucket ready: ${J1_ARTIFACT_BUCKET:-j1-artifacts}"

  # ─── Qdrant ──────────────────────────────────────────────────
  # Vector store. Phase 2 wires the adapter; Phase 1 just stands
  # the service up so config + reset are end-to-end testable.
  qdrant:
    image: qdrant/qdrant:latest
    container_name: j1-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${J1_QDRANT_PORT:-6333}:6333"
      - "${J1_QDRANT_GRPC_PORT:-6334}:6334"
    networks:
      - j1-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Neo4j ───────────────────────────────────────────────────
  # Graph store. The community edition is sufficient for dev; swap
  # for ``neo4j:5-enterprise`` if your prod parity demands it.
  neo4j:
    image: neo4j:5-community
    container_name: j1-neo4j
    environment:
      NEO4J_AUTH: ${J1_GRAPH_USER:-neo4j}/${J1_GRAPH_PASSWORD:-neo4j-dev}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "${J1_NEO4J_HTTP_PORT:-7474}:7474"
      - "${J1_NEO4J_BOLT_PORT:-7687}:7687"
    networks:
      - j1-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── J1 backend ──────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: deploy/dev/Dockerfile
    image: j1-dev:latest
    container_name: j1-api
    env_file: ../../.env
    environment:
      # Default the runtime profile to ``dev`` so the loader doesn't
      # fail on missing prod-only providers.
      J1_RUNTIME_PROFILE: ${J1_RUNTIME_PROFILE:-dev}
    ports:
      - "${J1_API_PORT:-8000}:8000"
    volumes:
      - j1_temp:/tmp/j1
      - raganything_workdir:/var/lib/j1/raganything
      - benchmark_output:/var/lib/j1/benchmarks
      # Bind-mount Python source so code edits land without rebuilding
      # the image. ``pip install -e .`` (run during the image build)
      # symlinked the j1 package; the bind mount transparently
      # replaces the baked-in source files with the host copy. Restart
      # the container after edits — there's no auto-reload (Temporal
      # workflow code is replay-sensitive).
      - ../../src:/app/src
      - ../../deploy:/app/deploy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      temporal:
        condition: service_healthy
      temporal-init:
        condition: service_completed_successfully
    networks:
      - j1-net
    restart: unless-stopped
    command: ["python", "-m", "deploy.dev.api"]

  worker:
    image: j1-dev:latest
    container_name: j1-worker
    build:
      context: ../..
      dockerfile: deploy/dev/Dockerfile
    env_file: ../../.env
    environment:
      J1_RUNTIME_PROFILE: ${J1_RUNTIME_PROFILE:-dev}
    volumes:
      - j1_temp:/tmp/j1
      - raganything_workdir:/var/lib/j1/raganything
      - mineru_workdir:/var/lib/j1/mineru
      - benchmark_output:/var/lib/j1/benchmarks
      - ../../src:/app/src
      - ../../deploy:/app/deploy
    tmpfs:
      # RAM-backed `/tmp` for the worker. MinerU + RAGAnything touch
      # a lot of small ephemeral files (intermediate page captures,
      # soffice's mkdtemp, Python's default tempdir). 1 GiB cap stops
      # a runaway parse from OOM-ing the host.
      - /tmp:size=1g,mode=1777
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      temporal:
        condition: service_healthy
      temporal-init:
        condition: service_completed_successfully
    networks:
      - j1-net
    restart: unless-stopped
    command: ["python", "-m", "deploy.dev.worker"]

  # ─── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${J1_FRONTEND_API_BASE_URL:-/api}
    image: j1-frontend:latest
    container_name: j1-frontend
    ports:
      - "${J1_FRONTEND_PORT:-8081}:80"
    depends_on:
      - api
    networks:
      - j1-net
    restart: unless-stopped

  # ─── Temporal ────────────────────────────────────────────────
  # Uses the shared postgres (``temporal`` database created by the
  # init script).
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: j1-temporal
    environment:
      - DB=postgres12_pgx
      - DB_PORT=5432
      - POSTGRES_USER=${J1_POSTGRES_USER:-j1}
      - POSTGRES_PWD=${J1_POSTGRES_PASSWORD:-j1}
      - POSTGRES_SEEDS=postgres
      - POSTGRES_DB=temporal
      - DEFAULT_NAMESPACE=default
      - SKIP_DEFAULT_NAMESPACE_CREATION=false
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - j1-net
    healthcheck:
      test:
        - "CMD"
        - "tctl"
        - "--address"
        - "temporal:7233"
        - "workflow"
        - "list"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  # One-shot init: registers J1's custom search attributes.
  temporal-init:
    image: temporalio/auto-setup:1.24.2
    container_name: j1-temporal-init
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - j1-net
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "[temporal-init] registering J1 search attributes…"
        register_keyword() {
          tctl --auto_confirm --address temporal:7233 \
            admin cluster add-search-attributes \
            --name "$$1" --type Keyword \
          || echo "[temporal-init] $$1 already registered — skipping"
        }
        register_int() {
          tctl --auto_confirm --address temporal:7233 \
            admin cluster add-search-attributes \
            --name "$$1" --type Int \
          || echo "[temporal-init] $$1 already registered — skipping"
        }
        register_keyword J1IngestStage
        register_keyword J1IngestMode
        register_keyword J1DocumentId
        register_keyword J1WorkspaceId
        register_keyword J1ParserName
        register_keyword J1RequiresVision
        register_keyword J1RequiresPremiumLLM
        register_keyword J1DomainProfileId
        register_keyword J1EnrichmentPolicy
        register_keyword J1RequireEnrichmentSuccess
        register_keyword J1FinalStatus
        register_int     J1CompileRetryCount
        register_int     J1EnrichmentRetryCount
        # Phase 1: snapshot lineage on workflows that promote snapshots.
        register_keyword J1SnapshotId
        register_keyword J1ActiveSnapshotId
        echo "[temporal-init] done."

  temporal-ui:
    image: temporalio/ui:2.31.0
    container_name: j1-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:${J1_TEMPORAL_UI_PORT:-8080}
    ports:
      - "${J1_TEMPORAL_UI_PORT:-8080}:8080"
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - j1-net

networks:
  j1-net:
    driver: bridge

# Named volumes. Heavy runtime + index + temp paths live here so
# macOS Docker Desktop doesn't pay the FUSE penalty on every read /
# write. ``scripts/dev/reset_docker.sh`` wipes all of them.
volumes:
  pg_data:                  # postgres (temporal + j1 databases)
  minio_data:               # S3 artifact storage
  qdrant_data:              # vector store
  neo4j_data:               # graph store
  neo4j_logs:               # graph store logs
  raganything_workdir:      # RAGAnything (composite of lightrag + mineru workdirs)
  mineru_workdir:           # MinerU intermediate parses
  j1_temp:                  # cross-service scratch (NOT shared with /tmp tmpfs)
  benchmark_output:         # phase-1 benchmark / timing artifacts
